name: release-package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本标签，例如 v0.0.2'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Pack tarball
        id: pack
        shell: pwsh
        run: |
          $packageFile = npm pack
          $packageFile = $packageFile | Select-Object -Last 1
          "package_file=$packageFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create Git tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ github.event.inputs.tag }}'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = context.sha

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              })
            } catch (error) {
              if (error.status !== 422) {
                throw error
              }
              core.info(`Tag ${tag} 已存在，跳过创建`)
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ${{ steps.pack.outputs.package_file }}
          generate_release_notes: true
          draft: false
          prerelease: false
