name: release-package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '可选：发布版本标签，例如 v0.0.2；留空时默认读取 package.json 的 version 并自动补 v 前缀'
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $inputTag = '${{ github.event.inputs.tag }}'.Trim()

          if ([string]::IsNullOrWhiteSpace($inputTag)) {
            $resolvedTag = "v$($package.version)"
          } else {
            $resolvedTag = $inputTag
          }

          "tag=$resolvedTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release tag: $resolvedTag"

      - name: Pack release archive
        id: pack
        shell: pwsh
        run: |
          $packageFile = npm pack
          $packageFile = $packageFile | Select-Object -Last 1

          $package = Get-Content package.json | ConvertFrom-Json
          $packageName = $package.name
          $packageVersion = $package.version
          $zipFile = "$packageName-$packageVersion.zip"

          $stageRoot = Join-Path $PWD 'release-stage'
          $extractRoot = Join-Path $stageRoot 'extract'
          $moduleRoot = Join-Path $stageRoot 'module'
          $finalModuleDir = Join-Path $moduleRoot $packageName

          if (Test-Path $stageRoot) {
            Remove-Item $stageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          New-Item -ItemType Directory -Path $moduleRoot | Out-Null

          tar -xzf $packageFile -C $extractRoot
          Move-Item (Join-Path $extractRoot 'package') $finalModuleDir

          if (Test-Path $zipFile) {
            Remove-Item $zipFile -Force
          }

          Compress-Archive -Path $finalModuleDir -DestinationPath $zipFile

          "package_file=$zipFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Created release archive: $zipFile"

      - name: Create Git tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release_tag.outputs.tag }}'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = context.sha

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              })
            } catch (error) {
              if (error.status !== 422) {
                throw error
              }
              core.info(`Tag ${tag} 已存在，跳过创建`)
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: ${{ steps.pack.outputs.package_file }}
          generate_release_notes: true
          draft: false
          prerelease: false
