name: release-package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '可选：发布版本标签，例如 v0.0.2；留空时默认读取 package.json 的 version 并自动补 v 前缀'
        required: false
  push:
    branches:
      - main
      - master
    paths:
      - package.json

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release plan
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const packageJsonPath = path.join(process.env.GITHUB_WORKSPACE, 'package.json')
            const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
            const currentVersion = String(packageJson.version || '').trim()

            if (!/^\d+\.\d+\.\d+$/.test(currentVersion)) {
              core.setFailed(`package.json version 格式无效: ${currentVersion}`)
              return
            }

            const compareVersions = (left, right) => {
              const leftParts = left.split('.').map(Number)
              const rightParts = right.split('.').map(Number)
              for (let i = 0; i < 3; i++) {
                const diff = leftParts[i] - rightParts[i]
                if (diff !== 0) {
                  return diff
                }
              }
              return 0
            }

            const isManual = context.eventName === 'workflow_dispatch'
            let shouldRelease = false
            let resolvedTag = `v${currentVersion}`

            if (isManual) {
              const inputTag = `${context.payload.inputs?.tag || ''}`.trim()
              resolvedTag = inputTag || resolvedTag
              shouldRelease = true
            } else {
              const tags = await github.paginate(github.rest.repos.listTags, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              })

              const versionTags = tags
                .map(tag => tag.name)
                .filter(name => /^v\d+\.\d+\.\d+$/.test(name))
                .sort((a, b) => compareVersions(a.slice(1), b.slice(1)))

              const latestTag = versionTags.at(-1) || null
              const latestVersion = latestTag ? latestTag.slice(1) : null

              if (!latestVersion || compareVersions(currentVersion, latestVersion) > 0) {
                shouldRelease = true
              }

              core.info(`Latest release tag: ${latestTag || 'none'}`)
              core.info(`Current package version: ${currentVersion}`)
              core.info(`Auto release enabled: ${shouldRelease}`)
            }

            core.setOutput('should_release', shouldRelease ? 'true' : 'false')
            core.setOutput('release_tag', resolvedTag)
            core.setOutput('release_version', currentVersion)
            core.info(`Resolved release tag: ${resolvedTag}`)

  build-and-release:
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Show release plan
        shell: pwsh
        run: |
          Write-Host "Release version: ${{ needs.resolve-release.outputs.release_version }}"
          Write-Host "Release tag: ${{ needs.resolve-release.outputs.release_tag }}"

      - name: Pack release archive
        id: pack
        shell: pwsh
        run: |
          $packageFile = npm pack
          $packageFile = $packageFile | Select-Object -Last 1

          $package = Get-Content package.json | ConvertFrom-Json
          $packageName = $package.name
          $packageVersion = $package.version
          $zipFile = "$packageName-$packageVersion.zip"

          $stageRoot = Join-Path $PWD 'release-stage'
          $extractRoot = Join-Path $stageRoot 'extract'
          $moduleRoot = Join-Path $stageRoot 'module'
          $finalModuleDir = Join-Path $moduleRoot $packageName

          if (Test-Path $stageRoot) {
            Remove-Item $stageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          New-Item -ItemType Directory -Path $moduleRoot | Out-Null

          tar -xzf $packageFile -C $extractRoot
          Move-Item (Join-Path $extractRoot 'package') $finalModuleDir

          if (Test-Path $zipFile) {
            Remove-Item $zipFile -Force
          }

          Compress-Archive -Path $finalModuleDir -DestinationPath $zipFile

          "package_file=$zipFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Created release archive: $zipFile"

      - name: Create Git tag
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ needs.resolve-release.outputs.release_tag }}'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = context.sha

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              })
            } catch (error) {
              if (error.status !== 422) {
                throw error
              }
              core.info(`Tag ${tag} 已存在，跳过创建`)
            }

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          PACKAGE_FILE: ${{ steps.pack.outputs.package_file }}
        run: |
          gh release view $env:RELEASE_TAG *> $null

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:RELEASE_TAG 已存在，覆盖附件"
            gh release upload $env:RELEASE_TAG $env:PACKAGE_FILE --clobber
            exit $LASTEXITCODE
          }

          gh release create $env:RELEASE_TAG $env:PACKAGE_FILE --generate-notes
